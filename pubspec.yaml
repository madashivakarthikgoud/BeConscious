name: beconscious
description: "BeConscious - Personal Finance Manager for Shiva Karthik"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # UI
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  fl_chart: ^0.68.0
  flutter_slidable: ^3.1.1
  intl: ^0.19.0
  percent_indicator: ^4.2.3

  # State Management
  flutter_riverpod: ^2.5.1

  # Navigation
  go_router: ^14.2.0

  # Local Storage
  hive_flutter: ^1.1.0
  path_provider: ^2.1.4

  # Utilities
  uuid: ^4.4.2
  share_plus: ^9.0.0
  file_picker: ^8.0.6
  url_launcher: ^6.2.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icons/IMG_20260517_095334.png"
  adaptive_icon_background: "#0A0A0F"
  adaptive_icon_foreground: "assets/icons/IMG_20260517_095334.png"

flutter:
  uses-material-design: true

  assets:
    - assets/icons/
