name: beconscious
description: "BeConscious - Personal Finance Manager for Shiva Karthik"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # UI
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  fl_chart: ^0.68.0
  flutter_slidable: ^3.1.1
  intl: ^0.19.0
  percent_indicator: ^4.2.3

  # State Management
  flutter_riverpod: ^2.5.1

  # Navigation
  go_router: ^14.2.0

  # Local Storage (always active - offline first)
  hive_flutter: ^1.1.0
  path_provider: ^2.1.4

  # Utilities
  uuid: ^4.4.2
  connectivity_plus: ^6.0.5
  share_plus: ^9.0.0
  csv: ^6.0.0

  # ============================================================
  # FIREBASE & AUTH — Uncomment AFTER Firebase setup (see SETUP.md)
  # ============================================================
  # firebase_core: ^3.3.0
  # firebase_auth: ^5.1.4
  # cloud_firestore: ^5.2.1
  # google_sign_in: ^6.2.1

  # SECURITY — Uncomment when needed
  # local_auth: ^2.2.0
  # flutter_secure_storage: ^9.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/icons/
